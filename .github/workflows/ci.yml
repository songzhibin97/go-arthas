name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + vet + test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi
      - name: Install eBPF toolchain
        run: |
          set -euo pipefail
          sudo apt-get update -y
          # noble 无独立 bpftool 包;改装 linux-tools-generic 并软链其自带 bpftool(GitHub
          # Azure 内核无对应 linux-tools-$(uname -r),其 wrapper 会 "not found for kernel" 失败)。
          sudo apt-get install -y clang llvm libbpf-dev linux-tools-common linux-tools-generic
          BPFTOOL="$(ls /usr/lib/linux-tools/*/bpftool 2>/dev/null | sort -V | tail -1)"
          [ -x "$BPFTOOL" ] || { echo "generic bpftool not found"; exit 1; }
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version
          test -f /sys/kernel/btf/vmlinux || { echo "runner kernel lacks BTF"; exit 1; }
      - name: Generate eBPF bindings
        run: |
          set -euo pipefail
          mkdir -p ebpf/bpf/headers
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > ebpf/bpf/headers/vmlinux.h
          ( cd ebpf && go generate ./... )
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./... -count=1 -timeout 20m

  test-race:
    name: race detector (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install eBPF toolchain
        run: |
          set -euo pipefail
          sudo apt-get update -y
          # noble 无独立 bpftool 包;改装 linux-tools-generic 并软链其自带 bpftool(GitHub
          # Azure 内核无对应 linux-tools-$(uname -r),其 wrapper 会 "not found for kernel" 失败)。
          sudo apt-get install -y clang llvm libbpf-dev linux-tools-common linux-tools-generic
          BPFTOOL="$(ls /usr/lib/linux-tools/*/bpftool 2>/dev/null | sort -V | tail -1)"
          [ -x "$BPFTOOL" ] || { echo "generic bpftool not found"; exit 1; }
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version
          test -f /sys/kernel/btf/vmlinux || { echo "runner kernel lacks BTF"; exit 1; }
      - name: Generate eBPF bindings
        run: |
          set -euo pipefail
          mkdir -p ebpf/bpf/headers
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > ebpf/bpf/headers/vmlinux.h
          ( cd ebpf && go generate ./... )
      - name: go test -race
        run: go test -race ./... -count=1 -timeout 30m
